name: CI

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python:
          - '3.10'
          - '3.13'
          - '3.14'
          - '3.13t'
          - '3.14t'

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Cache pip
        uses: actions/cache@v5
        with:
          key: cache--${{ matrix.os }}--${{ matrix.python }}--${{ hashFiles('./requirements*.txt', './Makefile') }}
          restore-keys: cache--${{ matrix.os }}--${{ matrix.python }}--
          path: ~/.cache/pip

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Display Python version
        run: |
          python -c 'import sys; print(sys.version)'
          python -c 'import sysconfig; print("Py_GIL_DISABLED =", sysconfig.get_config_var("Py_GIL_DISABLED"))'
        shell: bash

      - name: Update pip
        run: python -m pip install -U pip wheel setuptools

      - name: Install requirements
        run: python -m pip install -Ur requirements-dev.txt

      - name: Compile project
        run: make install

      - name: Verify free-threading opt-in (free-threaded builds only)
        if: endsWith(matrix.python, 't')
        run: |
          python -W error::RuntimeWarning -c "
          import sys, warnings
          with warnings.catch_warnings(record=True) as caught:
              warnings.simplefilter('always')
              import pyjson5
              assert pyjson5.encode({'ok': True}) == '{\"ok\":true}'
          gil_reenable = [w for w in caught if 'GIL' in str(w.message) and 'enabled' in str(w.message)]
          assert not gil_reenable, f'GIL was re-enabled on import: {gil_reenable}'
          assert sys._is_gil_enabled() is False, 'GIL is enabled at runtime'
          print('OK: pyjson5 loaded without re-enabling the GIL')
          "
        shell: bash

      - name: Run JSON5 tests suite
        run: python scripts/run-tests.py

      - name: Run "JSON is a Minefield" suite
        run: python scripts/run-minefield-test.py

      - name: Run threaded stress test
        run: python scripts/run-threaded-test.py --iterations 1000

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Cache pip
        uses: actions/cache@v5
        with:
          key: lint--${{ hashFiles('./requirements*.txt', './Makefile') }}
          restore-keys: lint--
          path: ~/.cache/pip

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Display Python version
        run: python -c 'import sys; print(sys.version)'

      - name: Update pip
        run: python -m pip install -U pip wheel setuptools

      - name: Install requirements
        run: python -m pip install -Ur requirements-dev.txt

      - name: Compile project
        run: make install
